stages:
  preprocess:
    cmd: uv run python src/preprocess.py
    deps:
      - src/preprocess.py
      - src/utils.py
      - data/raw/events.csv
    outs:
      - data/processed/events_clean.csv

  feature_eng:
    cmd: uv run python src/feature_eng.py
    deps:
      - src/feature_eng.py
      - src/utils.py
      - data/processed/events_clean.csv
    outs:
      - data/features/user_features.csv

  train:
    cmd: uv run python src/train.py
    deps:
      - src/train.py
      - data/features/user_features.csv
    outs:
      - models/recommender_model.pth