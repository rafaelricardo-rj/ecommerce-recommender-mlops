stages:
  preprocess:
    cmd: uv run python src/preprocess.py
    deps:
      - src/preprocess.py
      - src/utils.py
      - data/raw/events.csv
    outs:
      - data/processed/events_clean.csv

  feature_eng:
    cmd: uv run python src/feature_eng.py
    deps:
      - src/feature_eng.py
      - src/utils.py
      - data/processed/events_clean.csv
    outs:
      - data/features/user_features.csv

  train:
    cmd: uv run python src/train.py
    deps:
      - src/train.py
      - src/models.py
      - src/settings.py
      - src/registry.py
      - src/utils.py
      - data/features/user_features.csv
    outs:
      # Ordem espelha a execução em src/train.py:main()
      - models/Dummy_recommender_model.joblib
      - models/LR_recommender_model.joblib
      - models/KNN_recommender_model.joblib
      - models/RF_recommender_model.joblib
      - models/MLP_recommender_model.pth