# docker-compose.prod.yml — configuração para a VPS em produção.
#
# Diferenças em relação ao docker-compose.yml (local):
#   - O MLflow persiste dados em um volume no disco da VPS e reinicia sozinho
#     após reboot (restart: unless-stopped).
#   - A porta 5000 é exposta publicamente (0.0.0.0), pois os avaliadores
#     precisam acessar a UI/Registry direto por uma URL, sem túnel SSH.
#   - O serviço train é invocado via "docker compose run --rm train" pelo
#     pipeline CI/CD, tanto para o "dvc pull" quanto para o treino em si.

services:
  mlflow-server:
    build:
      context: .
      target: runtime
    image: ecommerce-recommender:prod
    container_name: ecommerce-mlflow-server
    # --allowed-hosts e CORS liberam o IP público da VPS; sem isso o MLflow
    # rejeita requisições cujo header Host/Origin não esteja na lista.
    # --serve-artifacts + --artifacts-destination: o servidor guarda os
    # artefatos em /mlflow/artifacts e os entrega via HTTP (mlflow-artifacts://).
    # NÃO usar --default-artifact-root: ele grava a URI como file:///mlflow/...,
    # que só existe dentro do container do mlflow-server — um cliente rodando
    # em outra máquina (ex: treino local publicando no MLflow da VPS) não
    # consegue escrever artefatos nesse caminho.
    # --workers 1: a VPS tem só 1 vCPU e 3.8GB de RAM compartilhados com
    # outros serviços. O default (4 workers) sobe 4 cópias da aplicação
    # (mesma imagem do treino, com torch/pandas/sklearn) e estoura a memória.
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
      --workers 1
      --allowed-hosts "mlflow-server*,localhost*,82.29.57.75*"
    environment:
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: http://82.29.57.75:5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      # A VPS tem só 1 vCPU: subir o Uvicorn com PyTorch/MLflow carregados
      # pode levar bem mais que os ~13s observados em máquinas mais rápidas.
      # Sem start_period, o healthcheck esgota as retries e marca o container
      # como unhealthy antes dele terminar de subir.
      start_period: 120s

  train:
    build:
      context: .
      target: runtime
    image: ecommerce-recommender:prod
    container_name: ecommerce-train
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
    command: >
      sh -c "python scripts/validate_env.py && python src/train.py"
    depends_on:
      mlflow-server:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs
      # .git fica fora da imagem (.dockerignore) para não inflar o build nem
      # invalidar o cache a cada commit. É montado só em runtime, somente
      # leitura, porque o DVC exige um repositório git para localizar o
      # projeto e ler .dvc/config ao rodar "dvc pull".
      - ./.git:/app/.git:ro

volumes:
  mlflow-data:
