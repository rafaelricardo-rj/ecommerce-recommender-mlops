services:
  mlflow-server:
    build:
      context: .
      target: runtime
    image: ecommerce-recommender:dev
    container_name: ecommerce-mlflow-server
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  train:
    build:
      context: .
      target: runtime
    image: ecommerce-recommender:dev
    container_name: ecommerce-train
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
    command: >
      sh -c "python scripts/validate_env.py && python src/train.py"
    depends_on:
      mlflow-server:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs

volumes:
  mlflow-data: